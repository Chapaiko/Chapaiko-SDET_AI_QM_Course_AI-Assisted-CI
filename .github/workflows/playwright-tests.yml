name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

# Cancel any in-progress run for the same PR to save CI minutes
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Top-level permissions (least privilege; job overrides below for Pages publishing)
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    env:
      CI: true
      # Store browser binaries outside node_modules so they survive between runs
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with Yarn cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using the frozen lockfile for reproducible builds
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Cache Playwright browser binaries keyed on the Playwright version
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      # Install Playwright browsers along with required OS-level dependencies
      # Only chromium is needed (matches playwright.config.ts projects)
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium

      # Install only OS-level system deps when browser binaries came from cache
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload HTML report for review in the GitHub Actions UI
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload traces to help debug failing tests
      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Playwright Tests Failed",
              "themeColor": "FF0000",
              "title": "❌ Playwright Tests Failed",
              "sections": [{
                "facts": [
                  { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                  { "name": "PR Author", "value": "${{ github.event.pull_request.user.login }}" },
                  { "name": "Branch", "value": "${{ github.head_ref }}" },
                  { "name": "Run", "value": "[View failed run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }]
            }'

      - name: Prepare history.json for GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        run: |
          PREV_HISTORY="[]"
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            PREV_HISTORY=$(git show origin/gh-pages:history.json 2>/dev/null || echo "[]")
          fi
          NEW_ENTRY=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg result "${{ job.status }}" \
            '{ timestamp: $ts, run_url: $run_url, sha: $sha, ref: $ref, result: $result }')
          echo "$PREV_HISTORY" | jq --argjson entry "$NEW_ENTRY" '. + [$entry]' > playwright-report/history.json

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        id: deploy-pages
        uses: actions/deploy-pages@v4

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run dependency vulnerability scan
        run: |
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if yarn audit --level high --json 2>/dev/null | \
              jq -r 'select(.type=="auditSummary") | .data.vulnerabilities | to_entries[] | select(.value > 0) | "\(.key): \(.value)"' \
              | tee /tmp/vuln_summary.txt | grep -q .; then
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r line; do
              echo "| $line |" | sed 's/: / | /' >> $GITHUB_STEP_SUMMARY
            done < /tmp/vuln_summary.txt
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ High or critical vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi
